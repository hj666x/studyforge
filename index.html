<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a1a">
<title>StudyForge - 专升本·考研学习引擎</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔥</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a1a;--bg2:#111128;--bg3:#1a1a3e;--card:#151535;--card-h:#1c1c48;
  --p:#6c5ce7;--pl:#a29bfe;--pk:#fd79a8;--pg:#00cec9;--py:#fdcb6e;--pr:#e17055;
  --grn:#00b894;--txt:#e8e8f0;--tx2:#9898c0;--tx3:#5858a0;--bdr:#252560;
  --r:14px;--rs:10px;
}
html,body{height:100%;overflow:hidden}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
  background:var(--bg);color:var(--txt);
}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--p);border-radius:2px}

/* === APP SHELL === */
.app{display:flex;flex-direction:column;height:100vh;height:100dvh}

/* Topbar */
.topbar{
  background:linear-gradient(135deg,var(--bg2),var(--bg3));
  padding:10px 16px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--bdr);flex-shrink:0;z-index:50;
}
.logo{font-size:1.2em;font-weight:800;background:linear-gradient(135deg,var(--pl),var(--pk));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.streak{display:flex;align-items:center;gap:5px;background:rgba(253,203,110,.12);padding:3px 10px;border-radius:16px;font-size:.8em;color:var(--py)}

/* Main scrollable area */
.main{flex:1;overflow-y:auto;overflow-x:hidden;padding:12px 14px 90px;max-width:680px;margin:0 auto;width:100%}

/* === COMPONENTS === */
.card{background:var(--card);border-radius:var(--r);padding:16px;margin-bottom:12px;border:1px solid var(--bdr);transition:.2s}
.card:hover{border-color:var(--p)}
.card-t{font-size:1.05em;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:7px}

/* Stats grid */
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:12px}
.stat{background:var(--card);border-radius:var(--rs);padding:14px;text-align:center;border:1px solid var(--bdr)}
.stat-v{font-size:1.7em;font-weight:800;background:linear-gradient(135deg,var(--pl),var(--pk));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stat-l{font-size:.75em;color:var(--tx3);margin-top:3px}

/* Checkin */
.checkin{
  text-align:center;padding:24px 16px;
  background:linear-gradient(135deg,rgba(108,92,231,.08),rgba(253,121,168,.08));
  border-radius:var(--r);border:1px dashed var(--p);margin-bottom:12px;
}
.cbtn{
  background:linear-gradient(135deg,var(--p),var(--pk));color:#fff;border:none;
  padding:12px 36px;border-radius:28px;font-size:1.05em;font-weight:700;
  cursor:pointer;transition:.3s;box-shadow:0 4px 18px rgba(108,92,231,.35);
}
.cbtn:hover{transform:scale(1.04);box-shadow:0 6px 24px rgba(108,92,231,.5)}
.cbtn:disabled{opacity:.4;cursor:default;transform:none}
.cbtn.done{background:var(--grn);box-shadow:0 4px 18px rgba(0,184,148,.35)}

/* Tasks */
.task{
  display:flex;align-items:center;gap:10px;padding:10px 12px;
  border-radius:var(--rs);background:var(--bg2);margin-bottom:6px;cursor:pointer;transition:.15s;
}
.task:hover{background:var(--bg3)}.task.done{opacity:.45}.task.done .task-txt{text-decoration:line-through}
.task-ck{
  width:22px;height:22px;border-radius:50%;border:2px solid var(--bdr);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;transition:.25s;
}
.task.done .task-ck{background:var(--grn);border-color:var(--grn)}
.task.done .task-ck::after{content:'✓';color:#fff;font-size:12px;font-weight:700}
.task-txt{flex:1;font-size:.9em}.task-tm{font-size:.75em;color:var(--tx3)}

/* Progress bar */
.pbar{width:100%;height:6px;background:var(--bg);border-radius:3px;overflow:hidden;margin:6px 0}
.pfill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--p),var(--pk));transition:width .6s ease}

/* Resource card */
.res{display:flex;gap:10px;padding:12px;background:var(--bg2);border-radius:var(--rs);margin-bottom:6px;cursor:pointer;transition:.2s;border:1px solid transparent}
.res:hover{border-color:var(--p);background:var(--bg3)}
.res-ic{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1.2em;flex-shrink:0}
.res-i{flex:1}.res-t{font-weight:600;font-size:.9em;margin-bottom:2px}.res-d{font-size:.78em;color:var(--tx2)}
.res-tag{font-size:.68em;padding:2px 7px;border-radius:8px;background:rgba(108,92,231,.12);color:var(--pl);margin-top:3px;display:inline-block}

/* University card */
.uni{background:var(--card);border-radius:var(--r);padding:16px;margin-bottom:10px;border:1px solid var(--bdr);transition:.2s}
.uni:hover{border-color:var(--pg)}
.uni-n{font-size:1.05em;font-weight:700;margin-bottom:3px}
.uni-m{font-size:.8em;color:var(--tx2);margin-bottom:6px}
.uni-s{font-size:.8em;color:var(--py);margin-bottom:6px}
.uni-d{font-size:.82em;color:var(--tx2);margin-bottom:10px}
.uni-lnk{display:flex;flex-wrap:wrap;gap:8px}
.uni-lnk a{font-size:.82em;color:var(--pg);text-decoration:none;display:flex;align-items:center;gap:3px}
.uni-lnk a:hover{text-decoration:underline}

/* Timer */
.timer-d{font-size:2.8em;font-weight:800;text-align:center;font-variant-numeric:tabular-nums;background:linear-gradient(135deg,var(--pl),var(--pk));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin:16px 0}
.timer-c{display:flex;gap:10px;justify-content:center}
.tbtn{padding:9px 24px;border-radius:22px;border:none;font-weight:700;font-size:.9em;cursor:pointer;transition:.25s}
.tbtn.go{background:var(--grn);color:#fff}.tbtn.st{background:var(--pr);color:#fff}.tbtn.rs{background:var(--bg3);color:var(--tx2);border:1px solid var(--bdr)}

/* Word card */
.wcard{background:var(--card);border-radius:var(--r);padding:18px;margin-bottom:10px;text-align:center;border:1px solid var(--bdr)}
.w-en{font-size:1.7em;font-weight:800;color:var(--pl);margin-bottom:3px}
.w-ph{font-size:.85em;color:var(--tx3);margin-bottom:6px}
.w-cn{font-size:1.05em;margin-bottom:10px}
.w-acts{display:flex;gap:10px;justify-content:center}
.wbtn{padding:7px 18px;border-radius:18px;border:1px solid var(--bdr);background:var(--bg2);color:var(--tx2);cursor:pointer;font-size:.82em;transition:.2s}
.wbtn:hover{border-color:var(--p);color:var(--pl)}.wbtn.know{border-color:var(--grn);color:var(--grn)}
.wbtn.know:hover{background:rgba(0,184,148,.12)}

/* Book item */
.book{display:flex;gap:10px;padding:12px;background:var(--bg2);border-radius:var(--rs);margin-bottom:6px;align-items:center}
.book-cv{width:40px;height:54px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:1.3em;flex-shrink:0}
.book-i{flex:1}.book-t{font-weight:600;font-size:.9em;margin-bottom:2px}.book-d{font-size:.78em;color:var(--tx2)}

/* Quote */
.quote{
  background:linear-gradient(135deg,rgba(108,92,231,.1),rgba(253,121,168,.1));
  border-radius:var(--r);padding:16px;text-align:center;margin-bottom:12px;border:1px solid rgba(108,92,231,.15);
}
.quote-t{font-size:.95em;font-style:italic;line-height:1.6}.quote-a{font-size:.78em;color:var(--tx3);margin-top:6px}

/* Calendar */
.cal-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.cal-n{background:none;border:none;color:var(--tx2);cursor:pointer;font-size:1.1em;padding:3px 7px}
.cal-m{font-weight:700;font-size:.95em}
.cal-wk{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:3px}
.cal-w{text-align:center;font-size:.65em;color:var(--tx3);padding:3px;font-weight:600}
.cal-g{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-d{
  aspect-ratio:1;border-radius:5px;background:var(--bg);font-size:.65em;
  display:flex;align-items:center;justify-content:center;color:var(--tx3);
}
.cal-d.chk{background:var(--grn);color:#fff;font-weight:700}
.cal-d.today{border:2px solid var(--p)}
.cal-d.fut{opacity:.25}

/* Subject card */
.sub{background:var(--card);border-radius:var(--r);padding:16px;margin-bottom:10px;border-left:4px solid var(--p)}
.sub.math{border-left-color:var(--pk)}.sub.eng{border-left-color:var(--pg)}.sub.cs{border-left-color:var(--py)}.sub.pol{border-left-color:var(--pr)}

/* Inner tabs */
.itabs{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:3px;-webkit-overflow-scrolling:touch}
.itab{
  padding:5px 14px;border-radius:18px;background:var(--bg3);color:var(--tx2);
  font-size:.82em;font-weight:600;cursor:pointer;white-space:nowrap;
  border:1px solid transparent;transition:.2s;flex-shrink:0;
}
.itab.on{background:rgba(108,92,231,.18);color:var(--pl);border-color:var(--p)}

/* Phase card */
.phase{position:relative;overflow:hidden}
.phase::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.phase.act::before{background:linear-gradient(90deg,var(--p),var(--pk))}
.phase.done::before{background:var(--grn)}
.phase.lock{opacity:.45}

/* Form */
.fg{margin-bottom:14px}
.fl{display:block;font-size:.82em;color:var(--tx2);margin-bottom:5px;font-weight:600}
.fi,.fs,.ft{
  width:100%;padding:9px 12px;background:var(--bg);border:1px solid var(--bdr);
  border-radius:var(--rs);color:var(--txt);font-size:.88em;outline:none;font-family:inherit;
}
.fi:focus,.fs:focus,.ft:focus{border-color:var(--p)}
.ft{min-height:70px;resize:vertical}
.fb{
  background:var(--p);color:#fff;border:none;padding:11px 20px;border-radius:var(--rs);
  font-weight:700;cursor:pointer;width:100%;font-size:.92em;transition:.25s;
}
.fb:hover{background:var(--pl)}

/* Empty state */
.empty{text-align:center;padding:30px 16px;color:var(--tx3)}
.empty-ic{font-size:2.5em;margin-bottom:10px}.empty-t{font-size:.9em}

/* Toast */
.toast{
  position:fixed;top:16px;left:50%;transform:translateX(-50%);
  background:var(--grn);color:#fff;padding:10px 20px;border-radius:24px;
  font-weight:600;font-size:.85em;z-index:999;opacity:0;transition:.3s;
  box-shadow:0 4px 18px rgba(0,184,148,.35);pointer-events:none;
}
.toast.show{opacity:1}

/* Bottom nav */
.bnav{
  position:fixed;bottom:0;left:0;right:0;
  background:rgba(14,14,38,.92);backdrop-filter:blur(16px);
  border-top:1px solid var(--bdr);display:flex;justify-content:space-around;
  padding:6px 0 env(safe-area-inset-bottom,6px);z-index:50;
}
.ni{
  display:flex;flex-direction:column;align-items:center;gap:1px;padding:3px 10px;
  cursor:pointer;color:var(--tx3);transition:.2s;background:none;border:none;font-family:inherit;
}
.ni.on{color:var(--pl)}.ni-ic{font-size:1.2em}.ni-lb{font-size:.65em;font-weight:600}

/* Chat */
.chat-wrap{position:fixed;bottom:64px;right:12px;z-index:200}
.chat-tog{
  width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,var(--p),var(--pk));
  border:none;color:#fff;font-size:1.3em;cursor:pointer;box-shadow:0 4px 18px rgba(108,92,231,.4);
  transition:.3s;display:flex;align-items:center;justify-content:center;
}
.chat-tog:hover{transform:scale(1.08)}
.chat-box{
  position:absolute;bottom:60px;right:0;width:340px;max-width:calc(100vw - 24px);
  height:460px;max-height:65vh;background:var(--bg2);border-radius:var(--r);
  border:1px solid var(--bdr);display:none;flex-direction:column;
  box-shadow:0 8px 36px rgba(0,0,0,.5);overflow:hidden;
}
.chat-box.open{display:flex}
.chat-hd{
  padding:12px 14px;background:linear-gradient(135deg,var(--bg3),var(--card));
  border-bottom:1px solid var(--bdr);font-weight:700;font-size:.9em;
  display:flex;justify-content:space-between;align-items:center;
}
.chat-cl{background:none;border:none;color:var(--tx2);cursor:pointer;font-size:1.1em}
.chat-msgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px}
.cmsg{max-width:82%;padding:9px 12px;border-radius:12px;font-size:.85em;line-height:1.5;word-break:break-word}
.cmsg.ai{background:var(--bg3);align-self:flex-start;border-bottom-left-radius:3px}
.cmsg.me{background:var(--p);align-self:flex-end;border-bottom-right-radius:3px}
.chat-inp{padding:10px;border-top:1px solid var(--bdr);display:flex;gap:7px}
.chat-txt{flex:1;background:var(--bg);border:1px solid var(--bdr);border-radius:18px;padding:8px 14px;color:var(--txt);font-size:.85em;outline:none}
.chat-txt:focus{border-color:var(--p)}
.chat-snd{
  background:var(--p);border:none;color:#fff;width:36px;height:36px;border-radius:50%;
  cursor:pointer;font-size:1em;display:flex;align-items:center;justify-content:center;
}

/* Tab content */
.tc{display:none}.tc.on{display:block}

/* Animations */
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fi-a{animation:fi .35s ease-out}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.03)}}
.pulse{animation:pulse 2s infinite}

/* Responsive */
@media(max-width:400px){
  .timer-d{font-size:2.2em}
  .chat-box{width:calc(100vw - 24px)}
}

/* Add course form toggle */
#addForm{display:none;margin-top:14px}

/* Phase tasks list */
.phase-tasks{margin:8px 0}
.phase-tasks li{font-size:.85em;padding:4px 0;color:var(--txt);list-style:none}
.phase-tasks li::before{content:'• ';color:var(--pl)}

.phase-res{margin:8px 0}
.phase-res div{font-size:.82em;padding:3px 0;color:var(--pg)}

/* Profile stats grid */
.pstats{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin:10px 0}
.pstat{background:var(--bg2);border-radius:var(--rs);padding:12px;text-align:center}
.pstat-v{font-size:1.4em;font-weight:800;color:var(--pl)}.pstat-l{font-size:.75em;color:var(--tx3);margin-top:2px}

/* AI suggestions */
.ai-suggest{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0}
.ai-chip{
  padding:5px 12px;border-radius:16px;background:var(--bg3);color:var(--tx2);
  font-size:.78em;cursor:pointer;border:1px solid var(--bdr);transition:.2s;
}
.ai-chip:hover{border-color:var(--p);color:var(--pl)}

/* Word progress */
.wprog{display:flex;align-items:center;gap:8px;margin-bottom:10px;font-size:.82em;color:var(--tx2)}
.wprog .pbar{flex:1}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="logo">🔥 StudyForge</div>
    <div class="streak">🔥 <span id="stk">0</span> 天</div>
  </div>

  <div class="main" id="main">
    <!-- HOME -->
    <div class="tc on" id="t-home">
      <div class="quote fi-a"><div class="quote-t" id="qt">""</div><div class="quote-a" id="qa"></div></div>
      <div class="checkin fi-a" id="cinArea">
        <div style="font-size:.85em;color:var(--tx2);margin-bottom:10px" id="cinDate"></div>
        <button class="cbtn pulse" id="cinBtn" onclick="doCin()">✅ 今日打卡</button>
        <div style="font-size:.75em;color:var(--tx3);margin-top:6px" id="cinHint">点击打卡，记录今天的学习</div>
      </div>
      <div class="stats fi-a">
        <div class="stat"><div class="stat-v" id="sDays">0</div><div class="stat-l">累计学习天数</div></div>
        <div class="stat"><div class="stat-v" id="sHrs">0</div><div class="stat-l">累计学习小时</div></div>
        <div class="stat"><div class="stat-v" id="sTask">0</div><div class="stat-l">完成任务数</div></div>
        <div class="stat"><div class="stat-v" id="sWord">0</div><div class="stat-l">已背单词</div></div>
      </div>
      <div class="card fi-a"><div class="card-t">📋 今日任务</div><div id="todayT"></div></div>
      <div class="card fi-a"><div class="card-t">📅 学习日历</div><div id="calArea"></div></div>
    </div>

    <!-- PLAN -->
    <div class="tc" id="t-plan">
      <div class="itabs"><div class="itab on" onclick="planTab('zsb')">专升本</div><div class="itab" onclick="planTab('ky')">考研</div></div>
      <div id="planC"></div>
    </div>

    <!-- RESOURCES -->
    <div class="tc" id="t-res">
      <div class="itabs" id="rTabs">
        <div class="itab on" onclick="resTab('vid')">📹 视频</div>
        <div class="itab" onclick="resTab('book')">📚 教材</div>
        <div class="itab" onclick="resTab('exam')">📝 真题</div>
        <div class="itab" onclick="resTab('uni')">🏫 院校</div>
        <div class="itab" onclick="resTab('cert')">📜 证书</div>
      </div>
      <div id="resC"></div>
    </div>

    <!-- TIMER -->
    <div class="tc" id="t-timer">
      <div class="card"><div class="card-t">⏱️ 学习计时器</div>
        <div class="timer-d" id="tDisp">00:00:00</div>
        <div class="timer-c">
          <button class="tbtn go" id="tGo" onclick="toggleT()">开始学习</button>
          <button class="tbtn rs" onclick="resetT()">重置</button>
        </div>
        <div style="text-align:center;margin-top:10px;font-size:.82em;color:var(--tx3)" id="tStat">准备开始</div>
      </div>
      <div class="card"><div class="card-t">📖 单词背诵</div><div id="wordA"></div></div>
      <div class="card"><div class="card-t">➕ 自定义课程</div>
        <div id="custC"></div>
        <button class="fb" style="margin-top:10px" onclick="toggleForm()">+ 添加自定义课程</button>
        <div id="addForm">
          <div class="fg"><label class="fl">课程名称</label><input class="fi" id="cName" placeholder="例如：数据结构"></div>
          <div class="fg"><label class="fl">学习目标</label><input class="fi" id="cGoal" placeholder="例如：掌握基础数据结构"></div>
          <div class="fg"><label class="fl">每日时长(分钟)</label><input class="fi" id="cTime" type="number" value="60"></div>
          <div class="fg"><label class="fl">资源链接</label><input class="fi" id="cRes" placeholder="B站/慕课链接"></div>
          <button class="fb" onclick="addCust()">保存课程</button>
        </div>
      </div>
    </div>

    <!-- PROFILE -->
    <div class="tc" id="t-prof">
      <div class="card"><div class="card-t">👤 个人信息</div>
        <div class="fg"><label class="fl">昵称</label><input class="fi" id="pName" onchange="saveProf()"></div>
        <div class="fg"><label class="fl">当前阶段</label>
          <select class="fs" id="pStage" onchange="saveProf()"><option value="zsb">专升本备考</option><option value="ky">考研备考</option></select>
        </div>
        <div class="fg"><label class="fl">目标院校</label>
          <select class="fs" id="pTgt" onchange="saveProf()">
            <option value="njnu">南京大学</option><option value="sjtu">上海交通大学</option>
            <option value="hfut">合肥工业大学</option><option value="whu">武汉大学</option>
          </select>
        </div>
        <div class="fg"><label class="fl">每日目标(分钟)</label><input class="fi" id="pDaily" type="number" value="180" onchange="saveProf()"></div>
      </div>
      <div class="card"><div class="card-t">📊 学习统计</div><div id="pStats"></div></div>
      <div class="card"><div class="card-t">🧠 AI智能分析</div><div id="aiAnalysis"></div></div>
      <div class="card"><div class="card-t">⚙️ 数据管理</div>
        <button class="fb" style="margin-bottom:8px;background:var(--pg)" onclick="expData()">📤 导出数据</button>
        <button class="fb" style="background:var(--pr)" onclick="if(confirm('确定清除所有数据？不可恢复！')){localStorage.clear();location.reload()}">🗑️ 清除所有数据</button>
      </div>
    </div>
  </div>

  <!-- AI Chat -->
  <div class="chat-wrap">
    <div class="chat-box" id="chatBox">

function rCal(){

  for(let i=0;i<fd;i++)h+='<div class="cal-d"></div>';
  for(let d=1;d<=dim;d++){
    const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const ck=S.cins[ds]?'chk':'',to=d===tdy?'today':'',fu=d>tdy?'fut':'';
    h+=`<div class="cal-d ${ck} ${to} ${fu}">${d}</div>`;
  }
  h+='</div>';$('calArea').innerHTML=h;
}

function rRes(){
  const tab=S.rTab;let h='';
  if(tab==='vid'){
    RES.vid.forEach(v=>{
      const lk=v.u?`onclick="window.open('${v.u}','_blank')"`:'';
      h+=`<div class="res" ${lk}><div class="res-ic" style="background:${v.bg}18">${v.ic}</div><div class="res-i"><div class="res-t">${v.t}</div><div class="res-d">${v.d}</div><span class="res-tag">${v.tag}</span></div></div>`;
    });
  }else if(tab==='book'){
    RES.book.forEach(b=>{
      h+=`<div class="book"><div class="book-cv" style="background:linear-gradient(135deg,${b.bg},${b.bg}88)">${b.ic}</div><div class="book-i"><div class="book-t">${b.t}</div><div class="book-d">${b.d}</div><span class="res-tag">${b.tag}</span></div></div>`;
    });
  }else if(tab==='exam'){
    RES.exam.forEach(e=>{
      const lk=e.u?`onclick="window.open('${e.u}','_blank')"`:'';
      h+=`<div class="res" ${lk}><div class="res-ic" style="background:${e.bg}18">${e.ic}</div><div class="res-i"><div class="res-t">${e.t}</div><div class="res-d">${e.d}</div><span class="res-tag">${e.tag}</span></div></div>`;
    });
  }else if(tab==='uni'){
    RES.uni.forEach(u=>{
      h+=`<div class="uni"><div class="uni-n">${u.n}</div><div class="uni-m">${u.lv} · ${u.loc}</div><div class="uni-s">📊 ${u.sc}</div><div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px">${(u.tags||[]).map(tg=>`<span style="font-size:.68em;padding:2px 7px;border-radius:8px;background:rgba(0,206,201,.12);color:var(--pg)">${tg}</span>`).join('')}</div><div class="uni-d">${u.desc}</div><div class="uni-lnk">${u.w?`<a href="${u.w}" target="_blank">🌐 学校官网</a>`:''}${u.g?`<a href="${u.g}" target="_blank">📖 研究生院</a>`:''}${u.e?`<a href="${u.e}" target="_blank">📝 报名入口</a>`:''}</div></div>`;
    });
  }else if(tab==='cert'){
    RES.cert.forEach(c=>{
      const lk=c.u?`onclick="window.open('${c.u}','_blank')"`:'';
      h+=`<div class="res" ${lk}><div class="res-ic" style="background:${c.bg}18">${c.ic}</div><div class="res-i"><div class="res-t">${c.t}</div><div class="res-d">${c.d}</div>${c.u?`<a href="${c.u}" target="_blank" style="font-size:.78em;color:var(--pg);text-decoration:none;margin-top:3px;display:inline-block">🔗 官方网站</a>`:''}</div></div>`;
    });
  }
  $('resC').innerHTML=h;
}

function resTab(t){
  S.rTab=t;
  const tabs=['vid','book','exam','uni','cert'];
  document.querySelectorAll('#rTabs .itab').forEach((e,i)=>e.classList.toggle('on',i===tabs.indexOf(t)));
  rRes();
}

// ---- Timer ----
function toggleT(){
  if(S.tRun){
    clearInterval(S.tIv);S.tRun=false;
    const mins=Math.floor(S.tSec/60);S.tMin+=mins;save();
    $('tGo').textContent='继续学习';$('tGo').classList.remove('st');$('tGo').classList.add('go');
    $('tStat').textContent=`本次学习 ${mins} 分钟`;rStats();
    if(mins>=1)toast(`📚 学习了 ${mins} 分钟！`);
  }else{
    S.tRun=true;
    S.tIv=setInterval(()=>{
      S.tSec++;
      const h=Math.floor(S.tSec/3600),m=Math.floor((S.tSec%3600)/60),s=S.tSec%60;
      $('tDisp').textContent=`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    },1000);
    $('tGo').textContent='暂停';$('tGo').classList.add('st');$('tGo').classList.remove('go');
    $('tStat').textContent='学习中...专注！';
  }
}
function resetT(){
  clearInterval(S.tIv);S.tRun=false;S.tSec=0;
  $('tDisp').textContent='00:00:00';
  $('tGo').textContent='开始学习';$('tGo').classList.remove('st');$('tGo').classList.add('go');
  $('tStat').textContent='准备开始';
}

function rWords(){
  const unseen=WORDS.filter((_,i)=>!S.words.includes(i));
  if(!unseen.length){
    $('wordA').innerHTML='<div class="empty"><div class="empty-ic">🎉</div><div class="empty-t">所有单词学完了！</div><button class="fb" style="margin-top:10px" onclick="S.words=[];S.wordIdx=0;save();rWords();rStats()">重置再来</button></div>';
    return;
  }
  const w=unseen[0],idx=WORDS.indexOf(w);
  const prog=Math.round((S.words.length/WORDS.length)*100);
  $('wordA').innerHTML=`
    <div class="wprog"><span>已学 ${S.words.length}/${WORDS.length}</span><div class="pbar" style="flex:1"><div class="pfill" style="width:${prog}%"></div></div><span>${prog}%</span></div>
    <div class="wcard">
      <div style="font-size:.75em;color:var(--tx3);margin-bottom:6px">还有 ${unseen.length} 个待学</div>
      <div class="w-en">${w.e}</div><div class="w-ph">${w.p}</div><div class="w-cn">${w.c}</div>
      <div class="w-acts">
        <button class="wbtn" onclick="skipW()">不认识 →</button>
        <button class="wbtn know" onclick="knowW(${idx})">认识 ✓</button>
      </div>
    </div>`;
}
function knowW(i){if(!S.words.includes(i))S.words.push(i);save();rWords();rStats();toast('👍 记住了！')}
function skipW(){rWords()}

  $('pTgt').value=S.prof.target;$('pDaily').value=S.prof.daily;
  const ci=Object.keys(S.cins).length;
  const avg=ci>0?(S.tMin/ci).toFixed(0):0;
  const cr=ci>0?Math.round((S.tDone/(ci*5))*100):0;
  $('pStats').innerHTML=`<div class="pstats">
    <div class="pstat"><div class="pstat-v">${ci}</div><div class="pstat-l">打卡天数</div></div>
    <div class="pstat"><div class="pstat-v">${S.stk}</div><div class="pstat-l">连续天数</div></div>
    <div class="pstat"><div class="pstat-v">${avg}</div><div class="pstat-l">日均(分)</div></div>
    <div class="pstat"><div class="pstat-v">${cr}%</div><div class="pstat-l">完成率</div></div>
  </div>
  <div style="font-size:.82em;color:var(--tx2);margin-top:10px">📊 累计 ${(S.tMin/60).toFixed(1)}h · 📝 ${S.tDone}任务 · 📖 ${S.words.length}词</div>`;

  // AI Analysis
  const tgt={njnu:'南京大学',sjtu:'上海交通大学',hfut:'合肥工业大学',whu:'武汉大学'}[S.prof.target]||'合肥工业大学';
  const days=Object.keys(S.cins).length;
  const avgMin=ci>0?(S.tMin/ci):0;
  let advice='';
  if(days===0)advice='你还没有开始打卡！点击首页"今日打卡"开始第一天学习。';
  else if(avgMin<60)advice=`日均学习${avgMin.toFixed(0)}分钟，建议增加到180分钟以上。${tgt}需要你付出更多努力！`;
  else if(avgMin<120)advice=`日均${avgMin.toFixed(0)}分钟，还不错！但距离${tgt}的目标还需要更系统的学习。建议每天至少3小时。`;
  else if(avgMin<180)advice=`日均${avgMin.toFixed(0)}分钟，学习状态良好！保持节奏，${tgt}在向你招手！`;
  else advice=`日均${avgMin.toFixed(0)}分钟，非常努力！${tgt}的目标很有希望，注意劳逸结合。`;

  let weak='';
  const taskKeys=Object.keys(S.ts).filter(k=>S.ts[k]);
  if(taskKeys.length<5)weak='⚠️ 完成的任务较少，建议每天坚持完成所有任务。';

  $('aiAnalysis').innerHTML=`<div style="font-size:.88em;line-height:1.6">
    <div style="margin-bottom:8px">🎯 目标：<strong>${tgt}</strong></div>
    <div style="margin-bottom:8px">${advice}</div>
    ${weak?`<div style="color:var(--py);margin-bottom:8px">${weak}</div>`:''}
    <div style="margin-top:12px;font-size:.82em;color:var(--tx3)">💡 AI分析基于你的学习数据自动生成，持续学习会让分析更精准</div>
  </div>`;
}

function saveProf(){
  S.prof.name=$('pName').value;S.prof.stage=$('pStage').value;

  save();rTasks();
}
