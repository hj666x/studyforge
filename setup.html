<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>StudyForge - DeepSeek 配置</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC',sans-serif;background:#0a0a1a;color:#e8e8f0;display:flex;align-items:center;justify-content:center;min-height:100vh}
.card{background:#151535;border:1px solid #252560;border-radius:14px;padding:32px;max-width:400px;width:90%;text-align:center}
h1{font-size:1.4em;margin-bottom:8px;background:linear-gradient(135deg,#a29bfe,#fd79a8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{color:#9898c0;font-size:.85em;margin-bottom:24px}
.ok{color:#00b894;font-size:1.1em;font-weight:700;margin:16px 0}
.err{color:#e17055;font-size:.9em;margin:12px 0}
.btn{background:linear-gradient(135deg,#6c5ce7,#fd79a8);color:#fff;border:none;padding:14px 32px;border-radius:28px;font-size:1em;font-weight:700;cursor:pointer;width:100%;margin-top:16px}
.btn:hover{transform:scale(1.02)}
.spin{display:inline-block;width:20px;height:20px;border:3px solid #252560;border-top-color:#6c5ce7;border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="card">
  <h1>🔥 StudyForge</h1>
  <div class="sub">DeepSeek AI 一键配置</div>
  <div id="st"><div class="spin"></div><div style="margin-top:12px;color:#9898c0">正在配置...</div></div>
</div>
<script>
const KEY='sk-605d92b33f3f4a9ba3a00393eb48ac1a';
try{
  let data=JSON.parse(localStorage.getItem('sf_dk'));
  // sf_dk stores the key directly as a string
  localStorage.setItem('sf_dk',JSON.stringify(KEY));
  // Also try to update the prof data if it exists
  let prof=JSON.parse(localStorage.getItem('sf_prof')||'{}');
  
  document.getElementById('st').innerHTML='<div class="ok">✅ 配置成功！</div><div style="color:#9898c0;font-size:.85em;margin:8px 0">DeepSeek API Key 已写入浏览器</div><a href="./" class="btn" style="display:block;text-decoration:none;text-align:center">打开 StudyForge →</a>';
}catch(e){
  document.getElementById('st').innerHTML='<div class="err">❌ '+e.message+'</div>';
}
</script>
</body>
</html>
